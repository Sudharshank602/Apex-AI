<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ApexAI — Talent Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090f;--surface:#111118;--surface2:#18181f;
  --border:#ffffff12;--text:#f0f0f5;--muted:#8888a0;
  --accent:#6c63ff;--green:#00e5be;--yellow:#f5c518;--red:#ff4757;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:0 0 80px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 24px}
 
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--green)}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
 
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all 0.2s}
.tab.active{background:var(--accent);color:#fff}
 
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;resize:vertical;min-height:220px;outline:none;line-height:1.7}
textarea:focus{border-color:var(--accent)}
input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:16px}
input[type=text]:focus{border-color:var(--accent)}
.btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.88}
.btn:disabled{opacity:0.4;cursor:not-allowed}
 
#status{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:10px;min-height:16px;text-align:center}
#loading{display:none;text-align:center;padding:40px}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.agent-step{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);padding:6px 0;transition:color 0.3s}
.agent-step.done{color:var(--green)}
.agent-step.active{color:var(--accent)}
 
#results{margin-top:8px}
.decision-box{border-radius:14px;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.decision-box.hire{background:#00e5be0d;border:1px solid #00e5be30}
.decision-box.consider{background:#f5c5180d;border:1px solid #f5c51830}
.decision-box.decline{background:#ff47570d;border:1px solid #ff475730}
.decision-word{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;letter-spacing:-1px}
.hire .decision-word{color:var(--green)}
.consider .decision-word{color:var(--yellow)}
.decline .decision-word{color:var(--red)}
.score-num{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1}
.score-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:4px;text-align:right}
 
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.bar-row{margin-bottom:12px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:5px}
.bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.tag{display:inline-block;padding:4px 10px;border-radius:16px;font-size:11px;font-family:'DM Mono',monospace;background:#6c63ff18;border:1px solid #6c63ff25;color:#a09af8;margin:3px}
.item{padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px;display:flex;gap:8px}
.num{width:18px;height:18px;min-width:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'DM Mono',monospace;color:#fff;margin-top:1px}
.report-text{background:var(--surface2);border-radius:10px;padding:16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.sec-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px}
.avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;flex-shrink:0}
 
.panel{display:none}
.panel.active{display:block}
 
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:12px 16px;text-align:left;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:14px 16px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:var(--surface2)}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace}
.pill-hire{background:#00e5be15;color:#00e5be;border:1px solid #00e5be25}
.pill-consider{background:#f5c51815;color:#f5c518;border:1px solid #f5c51825}
.pill-decline{background:#ff475715;color:#ff4757;border:1px solid #ff475725}
.view-btn{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;cursor:pointer}
.view-btn:hover{border-color:var(--accent);color:var(--accent)}
 
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px}
.metric{background:var(--surface);padding:18px 20px;text-align:center}
.metric-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.metric-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:3px;letter-spacing:0.05em}
</style>
</head>
<body>
<div class="wrap">
 
<nav>
  <div class="logo">Apex<span>AI</span></div>
  <div class="badge"><span class="dot"></span><span id="api-status">connecting...</span></div>
</nav>
 
<div class="metrics">
  <div class="metric"><div class="metric-val" style="color:var(--green)" id="m1">0</div><div class="metric-label">CANDIDATES</div></div>
  <div class="metric"><div class="metric-val" id="m2">0</div><div class="metric-label">HIRE DECISIONS</div></div>
  <div class="metric"><div class="metric-val" id="m3">—</div><div class="metric-label">AVG SCORE</div></div>
  <div class="metric"><div class="metric-val" style="color:var(--green)">4</div><div class="metric-label">AI AGENTS</div></div>
</div>
 
<div class="tabs">
  <button class="tab active" onclick="showTab('analyze')">Analyze Resume</button>
  <button class="tab" onclick="showTab('skillgap')">Skill Gap</button>
  <button class="tab" onclick="showTab('candidates')">All Candidates</button>
</div>
 
<!-- ANALYZE TAB -->
<div class="panel active" id="tab-analyze">
  <div class="card">
    <label>RESUME TEXT — paste the full resume below</label>
    <textarea id="resume-text" placeholder="John Smith
john@email.com
+1-555-1234
 
Summary
Senior engineer with 5 years experience...
 
Skills
Python, React, Docker, AWS, PostgreSQL...
 
Experience
Senior Engineer at Company 2021-2024
Led team of 5. Built APIs serving 1M users.
 
Education
B.Tech Computer Science 2019
 
Certifications
AWS Certified Solutions Architect"></textarea>
    <br/>
    <label>JOB TITLE (optional)</label>
    <input type="text" id="job-title" placeholder="e.g. Senior Backend Engineer"/>
    <button class="btn" id="run-btn" onclick="runPipeline()">Run AI Pipeline →</button>
    <div id="status"></div>
  </div>
 
  <div id="loading">
    <div class="spinner"></div>
    <div id="step1" class="agent-step">◦ ResumeAgent — parsing resume</div>
    <div id="step2" class="agent-step">◦ ScoringAgent — scoring 5 dimensions</div>
    <div id="step3" class="agent-step">◦ AdvisorAgent — generating advice</div>
    <div id="step4" class="agent-step">◦ ReportAgent — writing report</div>
  </div>
 
  <div id="results"></div>
</div>
 
<!-- SKILL GAP TAB -->
<div class="panel" id="tab-skillgap">
  <div class="card">
    <label>RESUME TEXT</label>
    <textarea id="gap-resume" style="min-height:160px" placeholder="Paste resume text here..."></textarea>
    <br/>
    <label>REQUIRED SKILLS (comma separated)</label>
    <input type="text" id="gap-skills" placeholder="Python, Docker, Kubernetes, AWS, React, PostgreSQL"/>
    <button class="btn" onclick="runSkillGap()">Analyze Skill Gap →</button>
    <div id="gap-status"></div>
  </div>
  <div id="gap-results"></div>
</div>
 
<!-- CANDIDATES TAB -->
<div class="panel" id="tab-candidates">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700">Candidate Database</div>
    <button class="view-btn" onclick="loadCandidates()">↻ Refresh</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div id="cand-table"></div>
  </div>
  <div id="cand-detail"></div>
</div>
 
</div>
 
<script>
const BASE = 'http://localhost:8000';
const API  = BASE + '/api/v1';
 
function sc(color){ return color==='hire'?'var(--green)':color==='consider'?'var(--yellow)':'var(--red)'; }
function barColor(v){ return v>=8?'var(--green)':v>=6?'var(--accent)':v>=4?'var(--yellow)':'var(--red)'; }
 
async function ping(){
  try{
    const r = await fetch(BASE+'/health');
    const d = await r.json();
    document.getElementById('api-status').textContent = 'API live v'+d.version;
    refreshMetrics();
  }catch(e){
    document.getElementById('api-status').textContent = 'API offline';
    document.querySelector('.dot').style.background='var(--red)';
  }
}
 
async function refreshMetrics(){
  try{
    const r = await fetch(API+'/candidates?limit=100');
    const d = await r.json();
    const list = d.data||[];
    const total = d.meta?.total||list.length;
    const hires = list.filter(c=>c.hiring_decision==='HIRE').length;
    const scores = list.filter(c=>c.overall_score).map(c=>c.overall_score);
    const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
    document.getElementById('m1').textContent = total;
    document.getElementById('m2').textContent = hires;
    document.getElementById('m3').textContent = avg;
  }catch(e){}
}
 
function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['analyze','skillgap','candidates'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='candidates') loadCandidates();
}
 
function setStatus(msg){ document.getElementById('status').textContent = msg; }
function setStep(n,state){
  const el = document.getElementById('step'+n);
  if(!el) return;
  el.className = 'agent-step '+(state||'');
  if(state==='done') el.textContent = el.textContent.replace('◦','✓');
  if(state==='active') el.textContent = el.textContent.replace('◦','›');
}
 
async function runPipeline(){
  const text = document.getElementById('resume-text').value.trim();
  if(text.length < 40){ setStatus('⚠ Please paste a full resume (at least a few lines).'); return; }
 
  document.getElementById('run-btn').disabled = true;
  document.getElementById('results').innerHTML = '';
  document.getElementById('loading').style.display = 'block';
  setStatus('');
 
  ['step1','step2','step3','step4'].forEach(id=>{
    const el=document.getElementById(id);
    el.className='agent-step';
    el.textContent = el.textContent.replace(/[✓›]/,'◦');
  });
 
  setStep(1,'active');
  setTimeout(()=>{ setStep(1,'done'); setStep(2,'active'); },700);
  setTimeout(()=>{ setStep(2,'done'); setStep(3,'active'); },1400);
  setTimeout(()=>{ setStep(3,'done'); setStep(4,'active'); },2100);
  setTimeout(()=>{ setStep(4,'done'); },2800);
 
  try{
    setStatus('Calling API...');
    const jt = document.getElementById('job-title').value.trim();
    const payload = {resume_text: text};
    if(jt) payload.job_title = jt;
 
    const resp = await fetch(API+'/predict', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
 
    setStatus('Got response: '+resp.status);
 
    const json = await resp.json();
    setStatus('Parsed JSON. Rendering...');
 
    if(!resp.ok){
      document.getElementById('loading').style.display='none';
      document.getElementById('run-btn').disabled=false;
      const errMsg = json?.detail?.[0]?.msg || json?.message || 'Error '+resp.status;
      setStatus('API Error: '+errMsg);
      return;
    }
 
    if(!json.data){
      document.getElementById('loading').style.display='none';
      document.getElementById('run-btn').disabled=false;
      setStatus('No data returned from API. Check uvicorn terminal.');
      return;
    }
 
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      showResults(json.data);
      document.getElementById('run-btn').disabled=false;
      setStatus('Done!');
      refreshMetrics();
    }, 400);
 
  }catch(err){
    document.getElementById('loading').style.display='none';
    document.getElementById('run-btn').disabled=false;
    setStatus('Error: '+err.message);
  }
}
 
function showResults(data){
  const pr = data.parsed_resume;
  const sc2 = data.scores;
  const adv = data.advice;
  const rep = data.report;
  const dec = rep.hiring_decision.toLowerCase();
  const initials = (pr.name||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const oc = sc2.overall>=8?'var(--green)':sc2.overall>=6?'var(--accent)':sc2.overall>=4?'var(--yellow)':'var(--red)';
 
  const dims = [
    ['Technical Skills', sc2.technical_skills],
    ['Experience Depth', sc2.experience_depth],
    ['Education Relevance', sc2.education_relevance],
    ['Communication', sc2.communication_clarity],
    ['Leadership', sc2.leadership_potential],
  ];
 
  let h = '';
 
  // Decision banner
  h += `<div class="decision-box ${dec}">
    <div>
      <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:6px;letter-spacing:0.1em">AI HIRING DECISION</div>
      <div class="decision-word">${rep.hiring_decision}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px;max-width:380px;line-height:1.5">${rep.recommendation}</div>
    </div>
    <div style="text-align:right">
      <div class="score-num" style="color:${oc}">${sc2.overall.toFixed(1)}<span style="font-size:20px;color:var(--muted);font-weight:400">/10</span></div>
      <div class="score-sub">OVERALL SCORE</div>
    </div>
  </div>`;
 
  // Profile
  h += `<div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
    <div class="avatar">${initials}</div>
    <div style="flex:1">
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800">${pr.name}</div>
      <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px">${pr.contact?.email||''} ${pr.contact?.phone?'· '+pr.contact.phone:''}</div>
    </div>
    <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">ID #${data.candidate_id}</div>
  </div>`;
 
  // Skills
  h += `<div class="card" style="margin-bottom:16px">
    <div class="sec-title">Detected Skills</div>
    <div>${(pr.skills||[]).slice(0,24).map(s=>`<span class="tag">${s}</span>`).join('')}</div>
  </div>`;
 
  // Score bars
  h += `<div class="card" style="margin-bottom:16px">
    <div class="sec-title">Score Breakdown</div>`;
  dims.forEach(([name,val])=>{
    const pct = Math.round(val/10*100);
    h += `<div class="bar-row">
      <div class="bar-label"><span>${name}</span><span style="color:${barColor(val)};font-weight:500">${val.toFixed(1)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(val)}"></div></div>
    </div>`;
  });
  h += `</div>`;
 
  // Strengths & Improvements
  h += `<div class="two">
    <div class="card">
      <div class="sec-title" style="color:var(--green)">✓ Strengths</div>
      ${(adv.strengths||[]).map((s,i)=>`<div class="item"><div class="num" style="background:var(--green)">${i+1}</div><span>${s}</span></div>`).join('')}
    </div>
    <div class="card">
      <div class="sec-title" style="color:var(--red)">↑ Improvements</div>
      ${(adv.improvement_areas||[]).map((s,i)=>`<div class="item"><div class="num" style="background:var(--red)">${i+1}</div><span>${s}</span></div>`).join('')}
    </div>
  </div>`;
 
  // Action items
  h += `<div class="card" style="margin-bottom:16px">
    <div class="sec-title">Action Items</div>
    ${(adv.action_items||[]).map((s,i)=>`<div class="item"><div class="num" style="background:var(--accent)">${i+1}</div><span>${s}</span></div>`).join('')}
  </div>`;
 
  // Career paths
  h += `<div class="card" style="margin-bottom:16px">
    <div class="sec-title">Career Path Suggestions</div>
    ${(adv.career_path_suggestions||[]).map(s=>`<div class="item"><span style="color:var(--green);margin-right:6px">→</span><span>${s}</span></div>`).join('')}
  </div>`;
 
  // Full report
  h += `<div class="card">
    <div class="sec-title">Full Talent Report</div>
    <div class="report-text">${(rep.full_report_text||'').replace(/</g,'&lt;')}</div>
  </div>`;
 
  const el = document.getElementById('results');
  el.innerHTML = h;
  el.style.display = 'block';
  window.scrollTo({top: el.offsetTop - 20, behavior:'smooth'});
}
 
async function runSkillGap(){
  const text = document.getElementById('gap-resume').value.trim();
  const skills = document.getElementById('gap-skills').value.trim();
  const statusEl = document.getElementById('gap-status');
  if(!text||!skills){ statusEl.textContent='Fill in both fields.'; return; }
  statusEl.textContent = 'Analyzing...';
  try{
    const required = skills.split(',').map(s=>s.trim()).filter(Boolean);
    const r = await fetch(API+'/skill-gap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resume_text:text,required_skills:required})});
    const d = await r.json();
    showGapResults(d.data);
    statusEl.textContent='';
  }catch(e){ statusEl.textContent='Error: '+e.message; }
}
 
function showGapResults(data){
  const match = (100-data.gap_percentage).toFixed(0);
  const matchColor = data.gap_percentage>60?'var(--red)':data.gap_percentage>30?'var(--yellow)':'var(--green)';
  let h = `<div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center">
      <div>
        <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em">SKILL MATCH RATE</div>
        <div style="font-family:'Syne',sans-serif;font-size:56px;font-weight:800;letter-spacing:-3px;color:${matchColor}">${match}%</div>
        <div style="height:8px;background:var(--surface2);border-radius:4px;margin:10px 0;overflow:hidden"><div style="height:100%;width:${match}%;background:${matchColor};border-radius:4px;transition:width 1s ease"></div></div>
        <div style="font-size:12px;color:var(--muted)">Est. time: <strong style="color:var(--text)">${data.estimated_learning_time}</strong></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--surface2);border-radius:10px;padding:14px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--green)">${data.present_skills.length}</div>
          <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:3px">PRESENT</div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:14px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--red)">${data.missing_skills.length}</div>
          <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:3px">MISSING</div>
        </div>
      </div>
    </div>
  </div>
  <div class="two" style="margin-top:14px">
    <div class="card">
      <div class="sec-title" style="color:var(--green)">Skills you have</div>
      <div>${(data.present_skills||[]).map(s=>`<span class="tag" style="background:#00e5be12;border-color:#00e5be25;color:#00e5be">${s}</span>`).join('')||'<span style="color:var(--muted);font-size:13px">None detected</span>'}</div>
    </div>
    <div class="card">
      <div class="sec-title" style="color:var(--red)">Skills to learn</div>
      <div>${(data.missing_skills||[]).map(s=>`<span class="tag" style="background:#ff475712;border-color:#ff475725;color:#ff6b6b">${s}</span>`).join('')||'<span style="color:var(--muted);font-size:13px">No gaps!</span>'}</div>
    </div>
  </div>`;
  document.getElementById('gap-results').innerHTML = h;
}
 
async function loadCandidates(){
  document.getElementById('cand-table').innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px">Loading...</div>';
  try{
    const r = await fetch(API+'/candidates?limit=100');
    const d = await r.json();
    const list = d.data||[];
    if(!list.length){ document.getElementById('cand-table').innerHTML='<div style="padding:32px;text-align:center;color:var(--muted)">No candidates yet. Run the pipeline first.</div>'; return; }
    let h = `<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Score</th><th>Decision</th><th>Date</th><th></th></tr></thead><tbody>`;
    list.forEach(c=>{
      const dec=(c.hiring_decision||'').toLowerCase();
      const pc=dec==='hire'?'pill-hire':dec==='consider'?'pill-consider':'pill-decline';
      const date=c.created_at?new Date(c.created_at).toLocaleDateString('en-IN'):'—';
      h+=`<tr>
        <td style="font-family:'DM Mono',monospace;color:var(--muted);font-size:12px">#${c.id}</td>
        <td style="font-weight:500">${c.name}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${c.email||'—'}</td>
        <td style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:${c.overall_score>=8?'var(--green)':c.overall_score>=6?'var(--accent)':'var(--yellow)'}">${(c.overall_score||0).toFixed(1)}</td>
        <td><span class="pill ${pc}">${c.hiring_decision||'—'}</span></td>
        <td style="font-size:12px;color:var(--muted)">${date}</td>
        <td><button class="view-btn" onclick="viewCandidate(${c.id})">View</button></td>
      </tr>`;
    });
    h+=`</tbody></table>`;
    document.getElementById('cand-table').innerHTML=h;
  }catch(e){ document.getElementById('cand-table').innerHTML='<div style="padding:20px;color:var(--red)">Error loading candidates.</div>'; }
}
 
async function viewCandidate(id){
  const detailEl = document.getElementById('cand-detail');
  detailEl.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-family:DM Mono,monospace;font-size:12px">Loading candidate...</div>';
  detailEl.scrollIntoView({behavior:'smooth', block:'start'});
 
  try{
    const r = await fetch(API+'/candidates/'+id);
    const d = await r.json();
    const c = d.data;
    const dec=(c.latest_report?.hiring_decision||'').toLowerCase();
    const nameClean = (c.name||'?').replace(/^name[:\s]*/i,'').trim();
    const initials = nameClean.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    const dims = c.scores?[
      ['Technical Skills', c.scores.technical_skills],
      ['Experience Depth', c.scores.experience_depth],
      ['Education Relevance', c.scores.education_relevance],
      ['Communication', c.scores.communication_clarity],
      ['Leadership', c.scores.leadership_potential],
    ]:[];
    const oc = c.scores?.overall>=8?'var(--green)':c.scores?.overall>=6?'var(--accent)':c.scores?.overall>=4?'var(--yellow)':'var(--red)';
 
    let h = `<div class="card" style="margin-top:16px;border:1px solid var(--accent)">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div class="avatar">${initials}</div>
        <div style="flex:1">
          <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">${nameClean}</div>
          <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px">${c.email||''} ${c.phone?'· '+c.phone:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:${oc}">${c.scores?.overall?.toFixed(1)||'—'}<span style="font-size:14px;color:var(--muted)">/10</span></div>
          <span class="pill ${dec==='hire'?'pill-hire':dec==='consider'?'pill-consider':'pill-decline'}">${c.latest_report?.hiring_decision||'—'}</span>
        </div>
      </div>
      ${dims.length?`<div style="margin-bottom:16px">
        ${dims.map(([name,val])=>`<div class="bar-row">
          <div class="bar-label"><span>${name}</span><span style="color:${barColor(val)};font-weight:500">${val.toFixed(1)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/10*100)}%;background:${barColor(val)}"></div></div>
        </div>`).join('')}
      </div>`:''}
      ${c.latest_report?.recommendation?`
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:6px;letter-spacing:0.05em">RECOMMENDATION</div>
      <div style="padding:14px;background:var(--surface2);border-radius:10px;font-size:13px;color:var(--muted);line-height:1.6">${c.latest_report.recommendation}</div>`:''}
      <button onclick="document.getElementById('cand-detail').innerHTML=''" style="margin-top:16px;padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer">✕ Close</button>
    </div>`;
 
    detailEl.innerHTML = h;
    detailEl.scrollIntoView({behavior:'smooth', block:'start'});
  }catch(e){
    detailEl.innerHTML='<div style="padding:20px;color:var(--red);font-size:13px">Error loading candidate: '+e.message+'</div>';
  }
}
 
ping();
</script>
</body>
</html>
